spring.application.name=FHIR Security Testing Platform
fhir.server.url=http://hapi.fhir.org/baseR4
spring.datasource.url=jdbc:postgresql://localhost:5432/fhir_security
spring.datasource.username=fhir_app
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Week 11 optional lab token (set via environment; do not put real secrets in source control)
fhir.security.test.bearer-token=${FHIR_SECURITY_TEST_BEARER_TOKEN:}
fhir.security.test.lab-base-url-contains=${FHIR_SECURITY_TEST_LAB_BASE_CONTAINS:}
fhir.security.test.out-of-scope-patient-id=${FHIR_SECURITY_TEST_OUT_OF_SCOPE_PATIENT_ID:}